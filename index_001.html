<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Feuerwehr Knoten-Master PRO v4</title>
    <style>
        :root {
            --fire-red: #d32f2f;
            --fire-dark: #8b0000;
            --gold: #ffc107;
            --success: #27ae60;
            --bg-dark: #121212;
            --panel-bg: #1e1e1e;
        }

        body { background-color: var(--bg-dark); color: white; font-family: 'Segoe UI', Roboto, Helvetica, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; margin: 0; }
        
        .setup-screen { background: var(--panel-bg); padding: 40px; border-radius: 20px; border: 4px solid var(--fire-red); width: 90%; max-width: 600px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .setup-btn { background: var(--fire-red); color: white; padding: 15px; width: 100%; margin-top: 20px; font-weight: bold; cursor: pointer; border: none; border-radius: 10px; font-size: 18px; transition: 0.3s; }
        .setup-btn:hover { background: #ff3d3d; transform: scale(1.02); }
        
        select, input { padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #444; width: 100%; box-sizing: border-box; background: #2a2a2a; color: white; font-size: 16px; }

        .game-screen { display: none; width: 100%; max-width: 900px; }
        .machine { background: var(--fire-red); padding: 25px; border-radius: 25px; border: 8px solid #333; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.6); }

        .scoreboard { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 20px; width: 100%; }
        .player-card { background: #2a2a2a; padding: 12px; border-radius: 12px; border-bottom: 4px solid #444; transition: 0.3s; }
        .player-card.active-player { border-color: var(--gold); background: #333; transform: translateY(-5px); box-shadow: 0 5px 15px rgba(255,193,7,0.3); }
        .player-card .p-name { font-weight: bold; font-size: 14px; text-transform: uppercase; color: #ccc; }
        .player-card.active-player .p-name { color: var(--gold); }
        .player-card .p-score { font-size: 24px; font-weight: 900; margin: 4px 0; }
        
        .slot-row { display: flex; gap: 15px; background: #222; padding: 20px; border-radius: 15px; margin-bottom: 25px; border: 4px inset #000; }
        .column { flex: 1; display: flex; flex-direction: column; }
        .label { font-size: 11px; color: var(--gold); margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        .slot { background: white; color: black; height: 80px; display: flex; align-items: center; justify-content: center; font-weight: 900; border-radius: 10px; font-size: 1.1rem; text-align: center; padding: 5px; }

        #timer-display { font-size: 90px; background: #000; color: #0f0; padding: 10px 50px; border-radius: 15px; margin-bottom: 20px; border: 4px solid #444; font-family: 'Courier New', monospace; text-shadow: 0 0 20px #0f0; }
        .finished { color: #f00 !important; text-shadow: 0 0 20px #f00 !important; }

        .mode-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 15px; font-weight: bold; border: 2px solid #444; border-radius: 10px; cursor: pointer; background: #222; color: #888; }
        .active-rookie { background: var(--success) !important; color: white !important; }
        .active-expert { background: #8e44ad !important; color: white !important; }

        .action-btn { width: 100%; padding: 20px; font-size: 22px; font-weight: 900; cursor: pointer; border-radius: 12px; border: none; margin-top: 10px; text-transform: uppercase; }
        #spin-btn { background: var(--gold); color: black; }
        #spin-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        #start-btn, #done-btn { background: var(--success); color: white; display: none; }
        #joker-btn { background: #2980b9; color: white; display: none; font-size: 16px; }

        #finish-overlay, #success-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .winner-podium { display: flex; align-items: flex-end; gap: 20px; margin: 40px 0; }
        .podium-place { background: #2a2a2a; padding: 20px; border-radius: 15px 15px 0 0; display: flex; flex-direction: column; align-items: center; min-width: 120px; }
        .p1 { height: 200px; border-top: 8px solid var(--gold); }
        .p2 { height: 160px; border-top: 8px solid #c0c0c0; }
        .p3 { height: 130px; border-top: 8px solid #cd7f32; }

        #joker-img-box { margin-top: 20px; display: none; }
        #joker-img-box img { max-width: 600%; max-height: 1200px; border: 4px solid white; border-radius: 10px; }
    </style>
</head>
<body>

    <div id="setup-screen" class="setup-screen">
        <h1 style="color: var(--fire-red);">🚒 EINSATZ-ZENTRALE</h1>
        <div style="text-align: left;">
            <label>Spielmodus:</label>
            <select id="game-type" onchange="togglePlayerInputs()">
                <option value="single">Einzelspieler</option>
                <option value="tournament">Turnier (2-5 Spieler)</option>
            </select>

            <div id="player-inputs-container" style="margin-top: 15px;">
                <input type="text" id="name-p1" class="player-input" placeholder="Name Spieler 1">
                <div id="extra-players-group" style="display: none;">
                    <input type="text" id="name-p2" class="player-input" placeholder="Name Spieler 2">
                    <input type="text" id="name-p3" class="player-input" placeholder="Name Spieler 3 (optional)">
                    <input type="text" id="name-p4" class="player-input" placeholder="Name Spieler 4 (optional)">
                    <input type="text" id="name-p5" class="player-input" placeholder="Name Spieler 5 (optional)">
                </div>
            </div>

            <label>Runden pro Teilnehmer:</label>
            <select id="tournament-mode">
                <option value="1">1 Runde</option>
                <option value="3">Best of 3</option>
                <option value="5">Best of 5</option>
            </select>
        </div>
        <button class="setup-btn" onclick="startGame()">ÜBUNG STARTEN</button>
    </div>

    <div id="game-screen" class="game-screen">
        <div id="scoreboard" class="scoreboard"></div>
        <div class="machine">
            <div class="mode-container">
                <button id="btn-rookie" class="mode-btn" onclick="setMode('rookie')">ROOKIE</button>
                <button id="btn-expert" class="mode-btn" onclick="setMode('expert')">EXPERT (x1.5)</button>
            </div>
            <div class="slot-row">
                <div class="column"><div class="label">KNOTEN</div><div class="slot" id="slot1">---</div></div>
                <div class="column"><div class="label">OBJEKT</div><div class="slot" id="slot2">---</div></div>
                <div class="column"><div class="label">ZEIT</div><div class="slot" id="slot3">---</div></div>
            </div>
            <div id="timer-display">00</div>
            <button id="spin-btn" class="action-btn" onclick="handleSpin()" disabled>MODUS WÄHLEN</button>
            <button id="start-btn" class="action-btn" onclick="handleStart()">START</button>
            <button id="done-btn" class="action-btn" onclick="handleDone()">ERLEDIGT / STOPP</button>
            <button id="joker-btn" class="action-btn" onclick="handleJoker()">JOKER</button>
            <div id="joker-img-box"><img id="joker-img" src=""></div>
        </div>
    </div>

    <div id="success-overlay">
        <h2 id="round-player-name" style="color:var(--gold); font-size:30px; margin:0;"></h2>
        <div style="font-size:80px; font-weight:900; color:white; margin:10px 0;" id="round-score-val">0</div>
        <div id="round-details" style="color:#aaa; font-size:18px; margin-bottom:30px; line-height:1.6;"></div>
        <button class="setup-btn" style="width:250px;" onclick="closeRoundOverlay()">WEITER</button>
    </div>

    <div id="finish-overlay">
        <h1 style="color: var(--gold); font-size: 40px;">TURNIER-ERGEBNIS</h1>
        <div class="winner-podium" id="podium-content"></div>
        <button class="setup-btn" style="width:300px;" onclick="generatePDFCertificate()">📄 ZERTIFIKAT DRUCKEN</button>
        <button class="setup-btn" style="width:300px; background:#444;" onclick="location.reload()">NEUSTART</button>
    </div>

    <script>
        const knotenDaten = {
            'Achterknoten': 				{ level: 2, img: 'img/achterknoten_gesteckt.PNG' }
        };
        const objekte = ['Saugkorb', 'Strahlrohr', 'Trage', 'Axt', 'Pfahl', 'Leiter'];
        const zeitenBase = [20, 30, 45, 60];

        let players = [];
        let currentPlayerIdx = 0;
        let maxRounds = 1;
        let timerLeft = 0;
        let countdown = null;
        let currentMode = null;
        let selectedK = "";
        let jokerUsed = false;

        function togglePlayerInputs() {
            const type = document.getElementById('game-type').value;
            document.getElementById('extra-players-group').style.display = type === 'tournament' ? 'block' : 'none';
        }

        function startGame() {
            const type = document.getElementById('game-type').value;
            players = [];
            if(type === 'single') {
                players.push({ name: document.getElementById('name-p1').value.trim() || "Spieler 1", score: 0, roundsPlayed: 0 });
            } else {
                if(!document.getElementById('name-p1').value.trim() || !document.getElementById('name-p2').value.trim()) {
                    alert("Bitte mindestens Spieler 1 & 2 ausfüllen!"); return;
                }
                for(let i=1; i<=5; i++) {
                    const val = document.getElementById('name-p'+i).value.trim();
                    if(val) players.push({ name: val, score: 0, roundsPlayed: 0 });
                }
            }
            maxRounds = parseInt(document.getElementById('tournament-mode').value);
            document.getElementById('setup-screen').style.display = "none";
            document.getElementById('game-screen').style.display = "block";
            updateScoreboard();
        }

        function updateScoreboard() {
            const sb = document.getElementById('scoreboard');
            sb.innerHTML = "";
            players.forEach((p, idx) => {
                const card = document.createElement('div');
                card.className = `player-card ${idx === currentPlayerIdx ? 'active-player' : ''}`;
                card.innerHTML = `<div class="p-name">${p.name}</div><div class="p-score">${p.score.toLocaleString()}</div>`;
                sb.appendChild(card);
            });
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('btn-rookie').className = 'mode-btn' + (mode === 'rookie' ? ' active-rookie' : '');
            document.getElementById('btn-expert').className = 'mode-btn' + (mode === 'expert' ? ' active-expert' : '');
            const spinBtn = document.getElementById('spin-btn');
            spinBtn.disabled = false;
            spinBtn.innerText = "SPIN"; // Button-Text ändert sich zu SPIN
        }

        function handleSpin() {
            jokerUsed = false;
            document.getElementById('joker-img-box').style.display = "none";
            document.getElementById('timer-display').classList.remove('finished');
            document.getElementById('spin-btn').disabled = true;
            let i = 0;
            const roll = setInterval(() => {
                const keys = Object.keys(knotenDaten);
                const k = keys[Math.floor(Math.random() * keys.length)];
                const o = objekte[Math.floor(Math.random() * objekte.length)];
                let z = zeitenBase[Math.floor(Math.random() * zeitenBase.length)];
                if(currentMode === 'expert') z = Math.max(10, Math.floor(z / 2));
                
                document.getElementById('slot1').innerText = k;
                document.getElementById('slot2').innerText = o;
                document.getElementById('slot3').innerText = z + "s";
                document.getElementById('timer-display').innerText = z;

                if(++i > 15) {
                    clearInterval(roll);
                    selectedK = k; timerLeft = z;
                    document.getElementById('start-btn').style.display = "block";
                }
            }, 70);
        }

        function handleStart() {
            document.getElementById('start-btn').style.display = "none";
            document.getElementById('done-btn').style.display = "block";
            document.getElementById('joker-btn').style.display = "block";
            countdown = setInterval(() => {
                timerLeft--;
                document.getElementById('timer-display').innerText = timerLeft;
                if(timerLeft <= 0) { clearInterval(countdown); document.getElementById('timer-display').classList.add('finished'); }
            }, 1000);
        }

        function handleJoker() {
            jokerUsed = true;
            timerLeft = Math.max(0, timerLeft - 10);
            document.getElementById('timer-display').innerText = timerLeft;
            document.getElementById('joker-img').src = knotenDaten[selectedK].img;
            document.getElementById('joker-img-box').style.display = "block";
            document.getElementById('joker-btn').style.display = "none";
        }

        function handleDone() {
            clearInterval(countdown);
            const p = players[currentPlayerIdx];
            const lvl = knotenDaten[selectedK].level;
            
            // AUSWERTUNG LOGIK (WIE FRÜHER)
            const basePoints = lvl * 150;
            const timeBonus = Math.max(0, timerLeft) * lvl * 10;
            let total = basePoints + timeBonus;
            if(currentMode === 'expert') total *= 1.5;
            if(jokerUsed) total *= 0.5;
            total = Math.floor(total);
            
            p.score += total;
            p.roundsPlayed++;
            
            document.getElementById('round-player-name').innerText = p.name;
            document.getElementById('round-score-val').innerText = "+" + total.toLocaleString();
            
            // TAGS WIEDER EINGEBUNDEN
            document.getElementById('round-details').innerHTML = `
                <b>Knoten-Level:</b> ${lvl} <br>
                <b>Zeit-Bonus:</b> +${timeBonus} <br>
                <b>Modus:</b> ${currentMode.toUpperCase()} <br>
                <b>Joker:</b> ${jokerUsed ? "Genutzt (Score halbiert)" : "Nicht genutzt"}
            `;
            
            document.getElementById('success-overlay').style.display = "flex";
            try { window.speechSynthesis.speak(new SpeechSynthesisUtterance("Klasse Arbeit!")); } catch(e){}
        }

        function closeRoundOverlay() {
            document.getElementById('success-overlay').style.display = "none";
            document.getElementById('done-btn').style.display = "none";
            document.getElementById('joker-btn').style.display = "none";
            document.getElementById('joker-img-box').style.display = "none";
            
            currentPlayerIdx = (currentPlayerIdx + 1) % players.length;
            if(players.every(p => p.roundsPlayed >= maxRounds)) showFinalResults();
            else { updateScoreboard(); resetUI(); }
        }

        function resetUI() {
            currentMode = null;
            document.getElementById('btn-rookie').className = 'mode-btn';
            document.getElementById('btn-expert').className = 'mode-btn';
            document.getElementById('spin-btn').disabled = true;
            document.getElementById('spin-btn').innerText = "MODUS WÄHLEN";
            document.getElementById('timer-display').innerText = "00";
            document.getElementById('slot1').innerText = "---";
            document.getElementById('slot2').innerText = "---";
            document.getElementById('slot3').innerText = "---";
        }

        function showFinalResults() {
            document.getElementById('game-screen').style.display = "none";
            document.getElementById('finish-overlay').style.display = "flex";
            const s = [...players].sort((a,b) => b.score - a.score);
            const pod = document.getElementById('podium-content');
            pod.innerHTML = "";
            if(s[1]) pod.innerHTML += `<div class="podium-place p2">2. <b>${s[1].name}</b><div>${s[1].score}</div></div>`;
            pod.innerHTML += `<div class="podium-place p1">🏆 <b>${s[0].name}</b><div>${s[0].score}</div></div>`;
            if(s[2]) pod.innerHTML += `<div class="podium-place p3">3. <b>${s[2].name}</b><div>${s[2].score}</div></div>`;
        }

        function generatePDFCertificate() {
            const s = [...players].sort((a,b) => b.score - a.score);
            const win = window.open('', '_blank');
            win.document.write(`<html><body style="text-align:center; font-family:sans-serif; border:10px double #d32f2f; padding:50px;">
                <h1>🚒 ZERTIFIKAT 🚒</h1><h2>Knoten-Master Wettbewerb</h2><hr>
                <p>Ergebnisse vom ${new Date().toLocaleDateString()}:</p>
                <table style="width:100%; font-size:24px; margin-top:30px;">${s.map((p,i)=>`<tr><td>${i+1}.</td><td><b>${p.name}</b></td><td>${p.score.toLocaleString()} Pkt</td></tr>`).join('')}</table>
                <p style="margin-top:50px; font-style:italic;">Gesehen und für "Gut" befunden.</p>
                <script>window.print();<\/script></body></html>`);
        }
    </script>
</body>
</html>
